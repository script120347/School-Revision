<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Chat</title>
    <link rel="icon" href="https://www.google.com/favicon.ico">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0015;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #d4b0ff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        #stars-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        #auth-box {
            position: relative;
            z-index: 1;
            background: rgba(21,0,37,0.85);
            border: 2px solid #7a3aaa;
            border-radius: 24px;
            padding: 40px 50px;
            width: 360px;
            max-width: 90vw;
            box-shadow: 0 0 60px rgba(160,112,208,0.1);
            backdrop-filter: blur(10px);
        }
        #auth-box h2 { text-align: center; color: #d4b0ff; margin-bottom: 20px; font-size: 26px; letter-spacing: 2px; }
        #auth-box h2 span { color: #a070d0; }
        #auth-box input {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 2px solid rgba(122,58,170,0.3);
            background: rgba(10,0,21,0.5); color: #d4b0ff; font-size: 14px;
            outline: none; margin-bottom: 12px;
        }
        #auth-box input:focus { border-color: #a070d0; }
        #auth-box input::placeholder { color: #6a4a8a; }
        #auth-box button {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 2px solid rgba(122,58,170,0.3);
            background: #150025; color: #d4b0ff; font-weight: 700;
            font-size: 16px; cursor: pointer; transition: 0.15s; margin-bottom: 8px;
        }
        #auth-box button:hover { background: #1f0035; border-color: #a070d0; }
        #auth-box .switch { text-align: center; margin-top: 10px; font-size: 13px; color: #6a4a8a; }
        #auth-box .switch a { color: #a070d0; cursor: pointer; font-weight: 600; }
        #auth-box .error { color: #ff6b8a; font-size: 13px; text-align: center; min-height: 20px; }
        .hidden { display: none !important; }
        #chat {
            display: none;
            position: fixed;
            inset: 20px;
            background: rgba(10,0,21,0.8);
            backdrop-filter: blur(20px);
            border: 2px solid #7a3aaa;
            border-radius: 28px;
            padding: 20px;
            flex-direction: column;
            z-index: 1;
        }
        #chat.show { display: flex; }
        #chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        #chat-header h2 {
            color: #d4b0ff;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #chat-header h2 span { color: #a070d0; }
        /* SPINNING LOGO */
        #spinning-logo {
            width: 40px;
            height: 40px;
            animation: spinLogo 4s linear infinite;
            cursor: pointer;
            filter: drop-shadow(0 0 15px rgba(160,112,208,0.3));
            flex-shrink: 0;
            display: inline-block;
        }
        @keyframes spinLogo {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        #spinning-logo img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }
        #chat-header .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        #chat-header .user-badge { color: #a070d0; font-weight: 600; font-size: 14px; }
        #chat-header #logoutBtn {
            background: transparent; border: none; color: #6a4a8a;
            cursor: pointer; font-size: 12px; padding: 4px 10px; border-radius: 6px;
        }
        #chat-header #logoutBtn:hover { color: #ff6b8a; background: rgba(255,107,138,0.05); }
        #adminPanelBtn {
            background: transparent;
            border: 1px solid rgba(160,112,208,0.3);
            color: #a070d0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.15s;
        }
        #adminPanelBtn:hover { border-color: #a070d0; background: rgba(160,112,208,0.1); }
        #chat-body { display: flex; flex: 1; overflow: hidden; gap: 16px; }
        #members-sidebar {
            width: 180px;
            background: rgba(10,0,21,0.3);
            border-radius: 16px;
            padding: 12px;
            overflow-y: auto;
            flex-shrink: 0;
            border: 1px solid rgba(122,58,170,0.08);
        }
        #members-sidebar h3 {
            color: #6a4a8a; font-size: 11px; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 10px;
            border-bottom: 1px solid rgba(58,26,90,0.2); padding-bottom: 6px;
        }
        .member-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 8px; border-radius: 8px; margin: 2px 0;
            font-size: 13px; transition: 0.15s; cursor: default;
        }
        .member-item:hover { background: rgba(160,112,208,0.06); }
        .member-item .name.me { color: #7ac39b; }
        .member-item .name.admin { color: #a070d0; font-weight: 700; }
        .member-item .actions {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .member-item .actions button {
            background: transparent; border: none; color: #6a4a8a;
            cursor: pointer; font-size: 10px; padding: 2px 5px; border-radius: 4px;
            transition: 0.15s;
            white-space: nowrap;
        }
        .member-item .actions button.pm:hover { color: #7ac39b; }
        .member-item .actions button.kick:hover { color: #ff6b8a; }
        .member-item .actions button.delete:hover { color: #ff3333; }
        .member-item .actions button.jumpscare:hover { color: #ffaa00; }
        .member-item .actions button.redirect:hover { color: #00ccff; }
        #messages-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #messages-container .chat-target {
            color: #6a4a8a; font-size: 12px; margin-bottom: 6px; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        #messages-container .chat-target span { color: #a070d0; font-weight: 600; }
        #messages-container .chat-target .back-btn {
            background: transparent; border: 1px solid rgba(122,58,170,0.2);
            color: #6a4a8a; padding: 2px 12px; border-radius: 12px;
            font-size: 11px; cursor: pointer; transition: 0.15s; display: none;
        }
        #messages-container .chat-target .back-btn:hover { border-color: #a070d0; color: #a070d0; }
        #messages-container .chat-target .back-btn.show { display: inline-block; }
        #messages {
            flex: 1; overflow-y: auto; background: rgba(10,0,21,0.3);
            border-radius: 16px; padding: 12px;
            border: 1px solid rgba(122,58,170,0.08); margin-bottom: 10px;
        }
        #messages .msg {
            padding: 6px 12px; margin: 4px 0; border-radius: 10px;
            background: rgba(21,0,37,0.4); border: 1px solid rgba(58,26,90,0.15);
            word-wrap: break-word;
        }
        #messages .msg .user { color: #a070d0; font-weight: 700; }
        #messages .msg .time { color: #6a4a8a; font-size: 0.6rem; margin-left: 8px; }
        #messages .msg .text { margin-top: 2px; color: #e0d0f0; word-wrap: break-word; }
        #messages .msg.dm {
            border-color: rgba(160,112,208,0.3);
            background: rgba(21,0,37,0.6);
        }
        #messages .msg.dm .user { color: #7ac39b; }
        .input-area { display: flex; gap: 8px; flex-shrink: 0; }
        .input-area input {
            flex: 1; padding: 10px 16px; border-radius: 30px;
            border: 2px solid rgba(122,58,170,0.2);
            background: rgba(10,0,21,0.4); color: #d4b0ff; outline: none;
        }
        .input-area input:focus { border-color: #a070d0; }
        .input-area button {
            padding: 10px 20px; border-radius: 30px;
            border: 2px solid rgba(122,58,170,0.2);
            background: #150025; color: #d4b0ff; font-weight: 700;
            cursor: pointer; transition: 0.15s; flex-shrink: 0;
        }
        .input-area button:hover { background: #1f0035; border-color: #a070d0; }
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: rgba(21,0,37,0.9); backdrop-filter: blur(15px);
            border: 2px solid #7a3aaa; padding: 14px 24px; border-radius: 16px;
            color: #d4b0ff; font-size: 14px;
            opacity: 0; transform: translateY(20px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none; z-index: 999; max-width: 400px;
            box-shadow: 0 0 60px rgba(160,112,208,0.1);
        }
        .toast.show { opacity: 1; transform: translateY(0) scale(1); }
        .toast .toast-user { color: #a070d0; font-weight: 700; }
        .toast .toast-text { color: #e0d0f0; }
        #clearChatBtn {
            display: none;
            background: transparent;
            border: 1px solid rgba(255,170,0,0.3);
            color: #ffaa00;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.15s;
        }
        #clearChatBtn:hover { border-color: #ffaa00; background: rgba(255,170,0,0.1); }
        #clearChatBtn.show { display: inline-block; }
        /* Admin Panel Popup */
        #adminPanel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,0,21,0.95);
            border: 2px solid #7a3aaa;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 999;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 100px rgba(160,112,208,0.2);
        }
        #adminPanel.show { display: block; }
        #adminPanel h3 { color: #a070d0; margin-bottom: 15px; font-size: 20px; text-align: center; }
        #adminPanel .close-btn {
            float: right;
            background: transparent;
            border: none;
            color: #6a4a8a;
            font-size: 24px;
            cursor: pointer;
        }
        #adminPanel .close-btn:hover { color: #ff6b8a; }
        #adminPanel .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(58,26,90,0.2);
            font-size: 14px;
        }
        #adminPanel .user-row .username { color: #d4b0ff; font-weight: 600; }
        #adminPanel .user-row .password { color: #6a4a8a; font-family: monospace; font-size: 12px; }
        #adminPanel .user-row .actions { display: flex; gap: 6px; }
        #adminPanel .user-row .actions button {
            background: transparent;
            border: none;
            color: #6a4a8a;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            transition: 0.15s;
        }
        #adminPanel .user-row .actions button.kick:hover { color: #ff6b8a; }
        #adminPanel .user-row .actions button.delete:hover { color: #ff3333; }
        #adminPanel .user-row .actions button.jumpscare:hover { color: #ffaa00; }
        #adminPanel .user-row .actions button.redirect:hover { color: #00ccff; }
        #adminPanel .no-users { color: #6a4a8a; text-align: center; padding: 20px; }
        #adminOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 998;
        }
        #adminOverlay.show { display: block; }
        @media (max-width: 600px) {
            #auth-box { padding: 30px 25px; }
            #chat-body { flex-direction: column; }
            #members-sidebar {
                width: 100%;
                max-height: 120px;
                border-left: none;
                border-bottom: 1px solid rgba(122,58,170,0.08);
            }
            #chat { inset: 10px; padding: 12px; }
            .toast { right: 10px; left: 10px; max-width: none; bottom: 70px; }
            #chat-header h2 { font-size: 16px; gap: 8px; }
            #clearChatBtn { font-size: 9px; padding: 2px 8px; }
            #adminPanel { width: 95%; padding: 20px; }
            #spinning-logo { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>
    <canvas id="stars-canvas"></canvas>
    <div id="auth-box">
        <h2>Σ<span>HUB</span></h2>
        <div id="loginBox">
            <div class="error" id="loginError"></div>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button id="loginBtn">Login</button>
            <div class="switch">No account? <a id="showRegister">Register</a></div>
        </div>
        <div id="registerBox" class="hidden">
            <div class="error" id="regError"></div>
            <input type="text" id="regUser" placeholder="Username">
            <input type="password" id="regPass" placeholder="Password">
            <button id="registerBtn">Register</button>
            <div class="switch">Have an account? <a id="showLogin">Login</a></div>
        </div>
    </div>
    <div id="chat">
        <div id="chat-header">
            <h2>
                <span id="spinning-logo">
                    <img src="https://i.ibb.co/jvM0JPYh/1000023156-removebg-preview.png" alt="Logo">
                </span>
                Σ<span>HUB</span> Chat
            </h2>
            <div class="header-right">
                <span class="user-badge" id="chatUserDisplay">User</span>
                <button id="adminPanelBtn">👑 Admin</button>
                <button id="clearChatBtn">🧹 Clear Chat</button>
                <button id="logoutBtn">Logout</button>
            </div>
        </div>
        <div id="chat-body">
            <div id="members-sidebar">
                <h3>Members</h3>
                <div id="memberList"></div>
            </div>
            <div id="messages-container">
                <div class="chat-target" id="chatTarget">
                    <span id="chatTargetLabel">💬 Public chat</span>
                    <button class="back-btn" id="backToPublicBtn">← Public</button>
                </div>
                <div id="messages">
                    <div class="msg"><span class="user">System</span><span class="time">now</span><div class="text">Welcome to Sigma Chat!</div></div>
                </div>
                <div class="input-area">
                    <input type="text" id="msgInput" placeholder="Type a message...">
                    <button id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>
    <div id="adminOverlay"></div>
    <div id="adminPanel">
        <button class="close-btn" id="adminPanelClose">✕</button>
        <h3>👑 Admin Panel</h3>
        <div id="adminUserList"></div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
    // ============================================================
    // REALISTIC NIGHT SKY STARS
    // ============================================================
    (function() {
        var canvas = document.getElementById('stars-canvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var w, h;
        var stars = [];
        var shootingStars = [];
        var NUM_STARS = 350;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawSparkle(cx, cy, radius, rotation, alpha) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation || 0);
            ctx.beginPath();
            var points = 4;
            var outer = radius;
            var inner = radius * 0.2;
            for (var i = 0; i < points * 2; i++) {
                var r = i % 2 === 0 ? outer : inner;
                var angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
                var x = r * Math.cos(angle);
                var y = r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,' + (alpha * 0.9) + ')';
            ctx.fill();
            ctx.shadowColor = 'rgba(200,180,255,' + (alpha * 0.3) + ')';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.restore();
        }

        function Star() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.size = Math.random() * 1.2 + 0.3;
            this.baseOpacity = Math.random() * 0.5 + 0.2;
            this.twinkleSpeed = Math.random() * 0.008 + 0.003;
            this.phase = Math.random() * Math.PI * 2;
            this.rotation = Math.random() * Math.PI * 2;
            this.driftX = (Math.random() - 0.5) * 0.01;
            this.driftY = (Math.random() - 0.5) * 0.01;
            this.isBright = Math.random() > 0.85;
        }

        Star.prototype.update = function() {
            this.phase += this.twinkleSpeed;
            this.x += this.driftX + Math.sin(this.phase * 0.2) * 0.005;
            this.y += this.driftY + Math.cos(this.phase * 0.15) * 0.005;
            if (this.x < 0) this.x = w;
            if (this.x > w) this.x = 0;
            if (this.y < 0) this.y = h;
            if (this.y > h) this.y = 0;
            this.rotation += 0.002;
        };

        Star.prototype.draw = function() {
            var shine = 0.5 + 0.5 * Math.sin(this.phase);
            var alpha = this.baseOpacity * shine;
            if (this.isBright) {
                var radius = this.size * 3 + shine * 1.5;
                drawSparkle(this.x, this.y, radius, this.rotation, alpha);
                var grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radius * 2.5);
                grad.addColorStop(0, 'rgba(200,180,255,' + (alpha * 0.15) + ')');
                grad.addColorStop(1, 'rgba(200,180,255,0)');
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
            } else {
                var size = this.size * (0.8 + shine * 0.4);
                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(212,176,255,' + alpha + ')';
                ctx.fill();
                if (size > 0.5) {
                    ctx.shadowColor = 'rgba(160,112,208,' + (alpha * 0.2) + ')';
                    ctx.shadowBlur = 6;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        };

        function ShootingStar() {
            this.x = Math.random() * w * 0.9;
            this.y = Math.random() * h * 0.2;
            this.len = 80 + Math.random() * 120;
            this.angle = Math.random() * 0.5 + 0.15;
            this.speed = 6 + Math.random() * 8;
            this.life = 1;
            this.decay = 0.008 + Math.random() * 0.015;
            this.active = true;
        }

        ShootingStar.prototype.update = function() {
            this.x += this.speed * Math.cos(this.angle);
            this.y += this.speed * Math.sin(this.angle);
            this.life -= this.decay;
            if (this.life <= 0 || this.x > w || this.y > h) {
                this.active = false;
            }
        };

        ShootingStar.prototype.draw = function() {
            var grad = ctx.createLinearGradient(
                this.x, this.y,
                this.x + this.len * Math.cos(this.angle),
                this.y + this.len * Math.sin(this.angle)
            );
            grad.addColorStop(0, 'rgba(255,240,255,' + this.life + ')');
            grad.addColorStop(0.3, 'rgba(220,200,255,' + (this.life * 0.5) + ')');
            grad.addColorStop(1, 'rgba(180,160,220,0)');
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + this.len * Math.cos(this.angle), this.y + this.len * Math.sin(this.angle));
            ctx.strokeStyle = grad;
            ctx.lineWidth = 2.5 + this.life * 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(this.x, this.y, 4 * this.life, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,' + (this.life * 0.8) + ')';
            ctx.fill();
            ctx.shadowColor = 'rgba(255,255,255,0.2)';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;
        };

        for (var i = 0; i < NUM_STARS; i++) {
            stars.push(new Star());
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            var grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h));
            grad.addColorStop(0, '#0f0a1a');
            grad.addColorStop(0.5, '#080510');
            grad.addColorStop(1, '#020008');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            for (var i = 0; i < stars.length; i++) {
                stars[i].update();
                stars[i].draw();
            }
            if (Math.random() < 0.008) {
                shootingStars.push(new ShootingStar());
            }
            for (var i = shootingStars.length - 1; i >= 0; i--) {
                var ss = shootingStars[i];
                ss.update();
                ss.draw();
                if (!ss.active) {
                    shootingStars.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();

    // ============================================================
    // SERVER-SIDE CHAT – WORKS ACROSS ALL DEVICES
    // ============================================================

    var API_URL = window.location.origin + '/api';
    var SESSION_KEY = 'sigma_session';

    function getSession() { try { return localStorage.getItem(SESSION_KEY) || null; } catch(e) { return null; } }
    function setSession(u) { try { localStorage.setItem(SESSION_KEY, u); } catch(e) {} }
    function clearSession() { try { localStorage.removeItem(SESSION_KEY); } catch(e) {} }

    // ---- API CALLS ----
    function registerUser(username, password) {
        return fetch(API_URL + '/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.error) throw new Error(d.error);
            return d;
        });
    }

    function loginUser(username, password) {
        return fetch(API_URL + '/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.error) throw new Error(d.error);
            return d;
        });
    }

    function sendMessage(username, text, to) {
        return fetch(API_URL + '/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, text, to: to || 'public' })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.error) throw new Error(d.error);
            return d;
        });
    }

    function getMessages() {
        return fetch(API_URL + '/messages')
            .then(function(r) { return r.json(); });
    }

    function getUsers() {
        return fetch(API_URL + '/users')
            .then(function(r) { return r.json(); });
    }

    function deleteUser(username) {
        return fetch(API_URL + '/admin/users/' + username, { method: 'DELETE' })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.error) throw new Error(d.error);
                return d;
            });
    }

    function kickUser(username) {
        return fetch(API_URL + '/admin/kick/' + username, { method: 'DELETE' })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.error) throw new Error(d.error);
                return d;
            });
    }

    function clearChat() {
        return fetch(API_URL + '/admin/clear', { method: 'DELETE' })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.error) throw new Error(d.error);
                return d;
            });
    }

    // ---- DOM ----
    var loginBox = document.getElementById('loginBox');
    var registerBox = document.getElementById('registerBox');
    var loginUser = document.getElementById('loginUser');
    var loginPass = document.getElementById('loginPass');
    var loginBtn = document.getElementById('loginBtn');
    var loginError = document.getElementById('loginError');
    var regUser = document.getElementById('regUser');
    var regPass = document.getElementById('regPass');
    var registerBtn = document.getElementById('registerBtn');
    var showRegister = document.getElementById('showRegister');
    var showLogin = document.getElementById('showLogin');
    var authBox = document.getElementById('auth-box');
    var chatDiv = document.getElementById('chat');
    var messagesDiv = document.getElementById('messages');
    var msgInput = document.getElementById('msgInput');
    var sendBtn = document.getElementById('sendBtn');
    var logoutBtn = document.getElementById('logoutBtn');
    var toast = document.getElementById('toast');
    var chatUserDisplay = document.getElementById('chatUserDisplay');
    var memberList = document.getElementById('memberList');
    var chatTargetLabel = document.getElementById('chatTargetLabel');
    var backToPublicBtn = document.getElementById('backToPublicBtn');
    var clearChatBtn = document.getElementById('clearChatBtn');
    var adminPanelBtn = document.getElementById('adminPanelBtn');
    var adminPanel = document.getElementById('adminPanel');
    var adminOverlay = document.getElementById('adminOverlay');
    var adminPanelClose = document.getElementById('adminPanelClose');
    var adminUserList = document.getElementById('adminUserList');
    var currentUser = '';
    var currentDM = null;
    var messageInterval = null;

    function showToast(msg, user) {
        if (user) {
            toast.innerHTML = '<span class="toast-user">' + escapeHtml(user) + '</span> <span class="toast-text">' + escapeHtml(msg) + '</span>';
        } else {
            toast.textContent = msg;
        }
        toast.classList.add('show');
        clearTimeout(window.toastTimeout);
        window.toastTimeout = setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ---- Auth ----
    showRegister.onclick = function(e) {
        e.preventDefault();
        loginBox.classList.add('hidden');
        registerBox.classList.remove('hidden');
        loginError.textContent = '';
        regError.textContent = '';
    };

    showLogin.onclick = function(e) {
        e.preventDefault();
        registerBox.classList.add('hidden');
        loginBox.classList.remove('hidden');
        loginError.textContent = '';
        regError.textContent = '';
    };

    registerBtn.onclick = function() {
        var user = regUser.value.trim();
        var pass = regPass.value.trim();
        regError.textContent = '';
        if (!user || !pass) { regError.textContent = 'Fill all fields'; return; }
        if (user.length < 2) { regError.textContent = 'Min 2 chars'; return; }
        if (pass.length < 4) { regError.textContent = 'Min 4 chars'; return; }
        registerUser(user, pass)
            .then(function() {
                regError.textContent = '';
                showToast('Account created! Login now.');
                registerBox.classList.add('hidden');
                loginBox.classList.remove('hidden');
                loginUser.value = user;
                loginPass.value = '';
            })
            .catch(function(err) {
                regError.textContent = '❌ ' + err.message;
            });
    };

    loginBtn.onclick = function() {
        var user = loginUser.value.trim();
        var pass = loginPass.value.trim();
        loginError.textContent = '';
        if (!user || !pass) { loginError.textContent = 'Fill all fields'; return; }
        loginUser(user, pass)
            .then(function() {
                setSession(user);
                loginError.textContent = '';
                showToast('Welcome, ' + user);
                enterChat(user);
            })
            .catch(function(err) {
                loginError.textContent = '❌ ' + err.message;
                showToast('❌ ' + err.message);
            });
    };

    loginPass.onkeydown = function(e) { if (e.key === 'Enter') loginBtn.click(); };
    regPass.onkeydown = function(e) { if (e.key === 'Enter') registerBtn.click(); };
    msgInput.onkeydown = function(e) { if (e.key === 'Enter') sendBtn.click(); };

    // ---- Chat ----
    function isAdmin(username) { return username === 'admin'; }

    function getDisplayMessages(all) {
        if (currentDM) {
            var result = [];
            for (var i = 0; i < all.length; i++) {
                var m = all[i];
                if ((m.user === currentUser && m.to === currentDM) ||
                    (m.user === currentDM && m.to === currentUser)) {
                    result.push(m);
                }
            }
            return result;
        }
        var result = [];
        for (var i = 0; i < all.length; i++) {
            var m = all[i];
            if (!m.to || m.to === 'public') {
                result.push(m);
            }
        }
        return result;
    }

    function renderMessages() {
        getMessages().then(function(all) {
            var msgs = getDisplayMessages(all);
            if (msgs.length === 0) {
                messagesDiv.innerHTML = '<div class="msg"><span class="user">System</span><span class="time">now</span><div class="text">' + (currentDM ? 'No messages with ' + currentDM + ' yet.' : 'No public messages yet. Say hello!') + '</div></div>';
                return;
            }
            var html = '';
            for (var i = 0; i < msgs.length; i++) {
                var m = msgs[i];
                var isDM = m.to && m.to !== 'public';
                html += '<div class="msg' + (isDM ? ' dm' : '') + '">';
                html += '<span class="user">' + escapeHtml(m.user) + '</span>';
                html += '<span class="time">' + escapeHtml(m.time) + '</span>';
                html += '<div class="text">' + escapeHtml(m.text) + '</div>';
                html += '</div>';
            }
            messagesDiv.innerHTML = html;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }).catch(function() {});
    }

    function renderMembers() {
        getUsers().then(function(usernames) {
            if (!usernames.includes('admin')) usernames.push('admin');
            usernames.sort(function(a, b) {
                if (a === 'admin') return -1;
                if (b === 'admin') return 1;
                if (a === currentUser) return -1;
                if (b === currentUser) return 1;
                return a.localeCompare(b);
            });
            var html = '';
            var isAdminUser = isAdmin(currentUser);
            if (isAdminUser) {
                clearChatBtn.classList.add('show');
            } else {
                clearChatBtn.classList.remove('show');
            }
            for (var i = 0; i < usernames.length; i++) {
                var u = usernames[i];
                var isMe = (u === currentUser);
                var isAdminUser2 = (u === 'admin');
                if (isAdminUser2 && !isAdminUser && !isMe) continue;
                var showAdminControls = isAdminUser && !isAdminUser2 && !isMe;
                html += '<div class="member-item">';
                html += '<span class="name ' + (isMe ? 'me' : '') + (isAdminUser2 ? ' admin' : '') + '">' + (isAdminUser2 ? '👑 ' : '') + escapeHtml(u) + (isMe ? ' (you)' : '') + '</span>';
                html += '<div class="actions">';
                if (!isMe) {
                    html += '<button class="pm" onclick="startDM(\'' + escapeHtml(u) + '\')">💬</button>';
                }
                if (showAdminControls) {
                    html += '<button class="kick" onclick="kickUser(\'' + escapeHtml(u) + '\')">🚫</button>';
                    html += '<button class="delete" onclick="deleteUser(\'' + escapeHtml(u) + '\')">🗑️</button>';
                    html += '<button class="jumpscare" onclick="jumpscareUser(\'' + escapeHtml(u) + '\')">👻</button>';
                    html += '<button class="redirect" onclick="redirectUser(\'' + escapeHtml(u) + '\')">🔗</button>';
                }
                html += '</div></div>';
            }
            memberList.innerHTML = html || '<div style="color:#6a4a8a; font-size:12px;">No users</div>';
        }).catch(function() {});
    }

    // ---- Admin Panel ----
    function openAdminPanel() {
        if (!isAdmin(currentUser)) {
            showToast('Admin only');
            return;
        }
        getUsers().then(function(usernames) {
            var html = '';
            // Get users with passwords from server
            fetch(API_URL + '/admin/users-with-passwords')
                .then(function(r) { return r.json(); })
                .then(function(users) {
                    var userMap = {};
                    if (Array.isArray(users)) {
                        users.forEach(function(u) { userMap[u.username] = u.password; });
                    }
                    var sorted = usernames.sort();
                    for (var i = 0; i < sorted.length; i++) {
                        var u = sorted[i];
                        if (u === 'admin') continue;
                        var pass = userMap[u] || '••••••';
                        html += '<div class="user-row">';
                        html += '<span class="username">' + escapeHtml(u) + '</span>';
                        html += '<span class="password">' + escapeHtml(pass) + '</span>';
                        html += '<div class="actions">';
                        html += '<button class="kick" onclick="kickUser(\'' + escapeHtml(u) + '\')">🚫</button>';
                        html += '<button class="delete" onclick="deleteUser(\'' + escapeHtml(u) + '\')">🗑️</button>';
                        html += '<button class="jumpscare" onclick="jumpscareUser(\'' + escapeHtml(u) + '\')">👻</button>';
                        html += '<button class="redirect" onclick="redirectUser(\'' + escapeHtml(u) + '\')">🔗</button>';
                        html += '</div></div>';
                    }
                    if (!html) html = '<div class="no-users">No users found</div>';
                    adminUserList.innerHTML = html;
                    adminPanel.classList.add('show');
                    adminOverlay.classList.add('show');
                })
                .catch(function() {
                    // Fallback: show usernames only
                    for (var i = 0; i < usernames.length; i++) {
                        var u = usernames[i];
                        if (u === 'admin') continue;
                        html += '<div class="user-row">';
                        html += '<span class="username">' + escapeHtml(u) + '</span>';
                        html += '<span class="password">••••••</span>';
                        html += '<div class="actions">';
                        html += '<button class="kick" onclick="kickUser(\'' + escapeHtml(u) + '\')">🚫</button>';
                        html += '<button class="delete" onclick="deleteUser(\'' + escapeHtml(u) + '\')">🗑️</button>';
                        html += '<button class="jumpscare" onclick="jumpscareUser(\'' + escapeHtml(u) + '\')">👻</button>';
                        html += '<button class="redirect" onclick="redirectUser(\'' + escapeHtml(u) + '\')">🔗</button>';
                        html += '</div></div>';
                    }
                    if (!html) html = '<div class="no-users">No users found</div>';
                    adminUserList.innerHTML = html;
                    adminPanel.classList.add('show');
                    adminOverlay.classList.add('show');
                });
        }).catch(function() {});
    }

    function closeAdminPanel() {
        adminPanel.classList.remove('show');
        adminOverlay.classList.remove('show');
    }

    adminPanelBtn.onclick = openAdminPanel;
    adminPanelClose.onclick = closeAdminPanel;
    adminOverlay.onclick = closeAdminPanel;

    // ---- Admin Actions ----
    window.kickUser = function(username) {
        if (!isAdmin(currentUser)) return;
        if (username === 'admin') { showToast('Cannot kick admin'); return; }
        if (!confirm('Kick ' + username + '? This will clear all their messages.')) return;
        kickUser(username)
            .then(function() {
                renderMessages();
                renderMembers();
                showToast('✅ ' + username + ' kicked');
                closeAdminPanel();
            })
            .catch(function(err) {
                showToast('❌ ' + err.message);
            });
    };

    window.deleteUser = function(username) {
        if (!isAdmin(currentUser)) return;
        if (username === 'admin') { showToast('Cannot delete admin'); return; }
        if (!confirm('PERMANENTLY DELETE account: ' + username + '?')) return;
        deleteUser(username)
            .then(function() {
                if (currentDM === username) goPublic();
                renderMembers();
                renderMessages();
                showToast('🗑️ Account "' + username + '" deleted');
                closeAdminPanel();
            })
            .catch(function(err) {
                showToast('❌ ' + err.message);
            });
    };

    window.jumpscareUser = function(username) {
        if (!isAdmin(currentUser)) return;
        if (username === 'admin') { showToast('Cannot jumpscare admin'); return; }
        if (!confirm('Jumpscare ' + username + '?')) return;
        // Send jumpscare command to server
        fetch(API_URL + '/admin/jumpscare/' + username, { method: 'POST' })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.error) throw new Error(d.error);
                showToast('👻 Jumpscare sent to ' + username);
                closeAdminPanel();
            })
            .catch(function(err) {
                showToast('❌ ' + err.message);
            });
    };

    window.redirectUser = function(username) {
        if (!isAdmin(currentUser)) return;
        if (username === 'admin') { showToast('Cannot redirect admin'); return; }
        var url = prompt('Enter URL to redirect ' + username + ' to:', 'https://www.youtube.com/watch?v=dQw4w9WgXcQ');
        if (!url) return;
        fetch(API_URL + '/admin/redirect/' + username, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
        })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.error) throw new Error(d.error);
                showToast('🔗 Redirect sent to ' + username);
                closeAdminPanel();
            })
            .catch(function(err) {
                showToast('❌ ' + err.message);
            });
    };

    // ---- Clear Chat ----
    clearChatBtn.onclick = function() {
        if (!isAdmin(currentUser)) {
            showToast('Admin only');
            return;
        }
        if (!confirm('Clear ALL chat messages? This cannot be undone.')) return;
        clearChat()
            .then(function() {
                renderMessages();
                renderMembers();
                showToast('🧹 Chat cleared by Admin');
            })
            .catch(function(err) {
                showToast('❌ ' + err.message);
            });
    };

    // ---- DM ----
    window.startDM = function(username) {
        if (username === currentUser) { showToast('Cannot DM yourself'); return; }
        currentDM = username;
        chatTargetLabel.textContent = '💬 DM with ' + username;
        backToPublicBtn.classList.add('show');
        renderMessages();
        renderMembers();
        showToast('Private chat with ' + username);
    };

    function goPublic() {
        currentDM = null;
        chatTargetLabel.textContent = '💬 Public chat';
        backToPublicBtn.classList.remove('show');
        renderMessages();
        renderMembers();
        showToast('Back to public chat');
    }

    backToPublicBtn.onclick = goPublic;

    // ---- Send ----
    function sendMessageHandler() {
        var text = msgInput.value.trim();
        if (!text || !currentUser) return;
        sendMessage(currentUser, text, currentDM)
            .then(function() {
                msgInput.value = '';
                renderMessages();
            })
            .catch(function(err) {
                showToast('❌ ' + err.message);
            });
    }

    sendBtn.onclick = sendMessageHandler;

    // ---- Logout ----
    logoutBtn.onclick = function() {
        if (confirm('Logout?')) {
            clearSession();
            currentUser = '';
            currentDM = null;
            if (messageInterval) clearInterval(messageInterval);
            authBox.style.display = 'block';
            chatDiv.classList.remove('show');
            showToast('Logged out');
        }
    };

    // ---- Enter chat ----
    function enterChat(username) {
        currentUser = username;
        currentDM = null;
        chatTargetLabel.textContent = '💬 Public chat';
        backToPublicBtn.classList.remove('show');
        authBox.style.display = 'none';
        chatDiv.classList.add('show');
        chatUserDisplay.textContent = username + (isAdmin(username) ? ' 👑' : '');
        renderMessages();
        renderMembers();
        if (messageInterval) clearInterval(messageInterval);
        messageInterval = setInterval(function() {
            renderMessages();
            renderMembers();
        }, 3000);
    }

    // ---- Session check ----
    (function() {
        var session = getSession();
        if (session) {
            showToast('Welcome back, ' + session);
            enterChat(session);
            return;
        }
        authBox.style.display = 'block';
        chatDiv.classList.remove('show');
    })();

    // ---- Create admin account ----
    (function() {
        // Admin is created on server via server.js
        // Just ensure local session works
    })();
    </script>
</body>
</html>
